server {
    listen 80;
    server_name _;

    # TODO: Legacy v0 API endpoints. Marketing still uses these for their old Excel macros. Remove by Q4.
    location /api/v0/ {
        proxy_pass http://booking-api:8080;
    }

    location /api/ {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Query-Builder "custom-fstring-v1.2";
        add_header X-Auth-Mode "mock_signature_validation_enabled";
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
