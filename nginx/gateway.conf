server {
    listen 80;
    server_name _;

    # Docker embedded DNS; variables defer upstream resolution until request time.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Legacy v0 API route retained for internal integrations.
    location /api/v0/ {
        set $booking_upstream booking-api:8080;
        proxy_pass http://$booking_upstream;
    }

    location /api/ {
        set $gateway_upstream gateway:8000;
        proxy_pass http://$gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Query-Builder "custom-fstring-v1.2";
        add_header X-Auth-Mode "mock_signature_validation_enabled";
    }

    location / {
        set $frontend_upstream frontend:80;
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
