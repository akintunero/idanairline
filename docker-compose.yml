services:
  postgres:
    image: postgres:16-alpine
    container_name: idan-postgres
    shm_size: 256mb
    environment:
      POSTGRES_USER: ${DB_USER:-idan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
      POSTGRES_DB: ${DB_NAME:-idanairline}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal_net

  redis:
    image: redis:7-alpine
    container_name: idan-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - internal_net

  nginx:
    image: nginx:1.27-alpine
    container_name: idan-nginx
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - public_net
      - internal_net

  frontend:
    container_name: idan-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
    restart: unless-stopped
    networks:
      - public_net

  gateway:
    container_name: idan-gateway
    build:
      context: .
      dockerfile: gateway/Dockerfile
    depends_on:
      booking-api:
        condition: service_started
      payment-api:
        condition: service_healthy
      user-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8000/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - public_net
      - internal_net

  booking-api:
    container_name: idan-booking-api
    build:
      context: .
      dockerfile: booking-api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-idan}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-idanairline}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-api:8080}
      FLASH_PROMO_CODE: ${FLASH_PROMO_CODE:-}
      FLASH_PROMO_MAX_SLOTS: ${FLASH_PROMO_MAX_SLOTS:-1}
      RACE_CONDITION_WINDOW_MS: ${RACE_CONDITION_WINDOW_MS:-400}
      DEFAULT_BOOKING_PRICE: ${DEFAULT_BOOKING_PRICE:-5000}
      CTF_FLAG_A01_BOLA: ${CTF_FLAG_A01_BOLA:-}
      CTF_FLAG_A06_RACE: ${CTF_FLAG_A06_RACE:-}
      CTF_FLAG_A09_SHADOW_API: ${CTF_FLAG_A09_SHADOW_API:-}
      CTF_FLAG_A10_FAIL_OPEN: ${CTF_FLAG_A10_FAIL_OPEN:-}
      CTF_FLAG_A13_PATH_TRAVERSAL: ${CTF_FLAG_A13_PATH_TRAVERSAL:-}
      CTF_FLAG_A15_IDOR: ${CTF_FLAG_A15_IDOR:-}
    volumes:
      - shared-data:/shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["NONE"]
    restart: unless-stopped
    networks:
      - internal_net

  payment-api:
    container_name: idan-payment-api
    build:
      context: .
      dockerfile: payment-api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      PROMO_CODE_GODMODE: ${PROMO_CODE_GODMODE:-}
      POISON_PILL_CARD: ${POISON_PILL_CARD:-}
      CTF_FLAG_A05_SQLI: ${CTF_FLAG_A05_SQLI:-}
      CTF_FLAG_A07_SSRF: ${CTF_FLAG_A07_SSRF:-}
      CTF_FLAG_A18_XXE: ${CTF_FLAG_A18_XXE:-}
    volumes:
      - ./ctf-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - internal_net

  user-api:
    container_name: idan-user-api
    build:
      context: .
      dockerfile: user-api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-idan}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-idanairline}
      JWT_SECRET: ${JWT_SECRET:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@idan.air}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-System Administrator}
      CTF_FLAG_A02_BROKEN_AUTH: ${CTF_FLAG_A02_BROKEN_AUTH:-}
      CTF_FLAG_A03_MASS_ASSIGNMENT: ${CTF_FLAG_A03_MASS_ASSIGNMENT:-}
      CTF_FLAG_A11_XSS: ${CTF_FLAG_A11_XSS:-}
      CTF_FLAG_A12_CSRF: ${CTF_FLAG_A12_CSRF:-}
      CTF_FLAG_A14_OPEN_REDIRECT: ${CTF_FLAG_A14_OPEN_REDIRECT:-}
      CTF_FLAG_A17_WEAK_CRYPTO: ${CTF_FLAG_A17_WEAK_CRYPTO:-}
    volumes:
      - shared-data:/shared
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - internal_net

  email-service:
    container_name: idan-email
    build:
      context: .
      dockerfile: email-service/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CTF_FLAG_A16_SSTI: ${CTF_FLAG_A16_SSTI:-}
    restart: unless-stopped
    networks:
      - internal_net

  waf-logger:
    container_name: idan-waf
    build:
      context: .
      dockerfile: waf-logger/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      CTF_FLAG_WAF: ${CTF_FLAG_WAF:-}
    restart: unless-stopped
    networks:
      - internal_net

  flag-validator:
    container_name: idan-flag-validator
    build:
      context: .
      dockerfile: challenge/source-whitelist/Dockerfile
    environment:
      CTF_FLAG_A01_BOLA: ${CTF_FLAG_A01_BOLA:-}
    restart: unless-stopped
    networks:
      - internal_net

  admin-bot:
    container_name: idan-admin-bot
    build:
      context: .
      dockerfile: admin-bot/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      USER_API_URL: ${USER_API_URL:-http://user-api:8080}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@idan.air}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      CTF_FLAG_A11_XSS: ${CTF_FLAG_A11_XSS:-}
    volumes:
      - shared-data:/shared
    depends_on:
      user-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal_net

networks:
  public_net:
    driver: bridge
  internal_net:
    driver: bridge
    internal: true

volumes:
  pgdata:
  shared-data:
